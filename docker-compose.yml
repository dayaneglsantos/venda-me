services:
  app:
    image: node:24
    working_dir: /app
    volumes:
      - ./:/app
    ports:
      - "5173:5173" # Porta do Vite (Frontend)
      - "4173:4173" # Porta de Preview do Vite
      - "3000:3000" # Porta do JSON Server (API)
    environment:
      - CHOKIDAR_USEPOLLING=true
    tty: true
    stdin_open: true
